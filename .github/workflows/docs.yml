name: Documentation CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'apps/ds-docs/**'
      - 'packages/**'
      - '.github/workflows/docs.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'apps/ds-docs/**'
      - 'packages/**'
      - '.github/workflows/docs.yml'

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8'

jobs:
  lint:
    name: Documentation Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Run documentation lint
        run: |
          cd apps/ds-docs
          pnpm run lint || echo "Lint script not defined, skipping..."
          
      - name: Validate frontmatter
        run: |
          cd apps/ds-docs
          node --loader ts-node/esm scripts/check-docs.ts --lint || true

  link-check:
    name: Link Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Check internal links
        run: |
          cd apps/ds-docs
          node --loader ts-node/esm scripts/check-docs.ts --links || true

  component-docs:
    name: Component Documentation Coverage
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Check component documentation coverage
        run: |
          cd apps/ds-docs
          node --loader ts-node/esm scripts/checkComponentDocs.ts

  api-extraction:
    name: API Extraction
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Extract component APIs
        run: |
          cd apps/ds-docs
          node --loader ts-node/esm scripts/extractComponentApi.ts || true
          
      - name: Upload API artifacts
        uses: actions/upload-artifact@v4
        with:
          name: component-api
          path: apps/ds-docs/src/generated/component-api/
          retention-days: 7

  build:
    name: Build Documentation
    runs-on: ubuntu-latest
    needs: [lint, link-check, component-docs]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Build search index
        run: |
          cd apps/ds-docs
          pnpm run build:search
          
      - name: Build documentation
        run: |
          cd apps/ds-docs
          pnpm run build
        env:
          ASTRO_TELEMETRY_DISABLED: true
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docs-build
          path: apps/ds-docs/dist/
          retention-days: 7

  preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: docs-build
          path: dist
          
      - name: Deploy to preview
        run: |
          echo "Preview deployment would happen here"
          echo "Build artifacts are ready at: dist/"
          # In a real setup, this would deploy to a preview environment
          # such as Vercel, Netlify, or Cloudflare Pages

  # Summary job that requires all checks to pass
  docs-check:
    name: Documentation Check Summary
    runs-on: ubuntu-latest
    needs: [lint, link-check, component-docs, build]
    if: always()
    
    steps:
      - name: Check job status
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" ]] || \
             [[ "${{ needs.link-check.result }}" == "failure" ]] || \
             [[ "${{ needs.component-docs.result }}" == "failure" ]] || \
             [[ "${{ needs.build.result }}" == "failure" ]]; then
            echo "❌ Documentation checks failed"
            exit 1
          fi
          echo "✅ All documentation checks passed"
